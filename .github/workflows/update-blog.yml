name: 블로그 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: RSS 읽어서 누적 업데이트
        run: python3 update.py

      - name: 변경사항 저장
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add index.html
          git diff --staged --quiet || git commit -m '블로그 자동 업데이트'
          git push
