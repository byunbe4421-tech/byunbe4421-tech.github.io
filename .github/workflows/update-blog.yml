name: 블로그 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: RSS 읽어서 누적 업데이트
        run: |
          python3 << 'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import datetime
          import re
          import os

          # 기존 index.html에서 링크 추출
          existing_links = []
          if os.path.exists('index.html'):
              with open('index.html', 'r', encoding='utf-8') as f:
                  content = f.read()
              existing_links = re.findall(r'href="(https://blog\.naver\.com/byunbe/[^"]+)"', content)
              existing_titles = re.findall(r'href="https://blog\.naver\.com/byunbe/[^"]+">([^<]+)</a>', content)
              existing_posts = list(zip(existing_titles, existing_links))
          else:
              existing_posts = []

          # RSS에서 새 글 가져오기
          rss_url = 'https://rss.blog.naver.com/byunbe'
          req = urllib.request.Request(rss_url, headers={'User-Agent': 'Mozilla/5.0'})
          response = urllib.request.urlopen(req)
          xml_data = response.read()

          root = ET.fromstring(xml_data)
          channel = root.find('channel')
          items = channel.findall('item')

          new_posts = []
          for item in items:
              title = item.find('title').text or ''
              link = item.find('link').text or ''
              if not link:
                  link = item.find('guid').text or ''
              if title and link:
                  new_posts.append((title.strip(), link.strip()))

          # 기존 링크에 없는 새 글만 추가
          existing_urls = [p[1] for p in existing_posts]
          added = 0
          for title, link in new_posts:
              if link not in existing_urls:
                  existing_posts.insert(0, (title, link))
                  existing_urls.insert(0, link)
                  added += 1

          all_posts = existing_posts
          list_items = '\n'.join([
              f'    <li><a href="{link}">{title}</a></li>'
              for title, link in all_posts
          ])

          updated = datetime.datetime.now().strftime('%Y년 %m월 %d일')

          html = f"""<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나무결상점 - 건축자재 인테리어 정보</title>
  <meta name="description" content="건축과 인테리어, 궁금할 땐 여기! 내·외장재부터 인테리어 자재, 친환경 도료까지 건축에 필요한 다양한 정보를 알려드려요.">
  <style>
    body {{ font-family: 'Noto Sans KR', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f9f9f9; color: #333; }}
    header {{ text-align: center; padding: 40px 0 20px; border-bottom: 2px solid #4a90a4; margin-bottom: 30px; }}
    header h1 {{ font-size: 28px; color: #2c5f6e; margin-bottom: 8px; }}
    header p {{ color: #666; font-size: 15px; }}
    .updated {{ text-align: center; font-size: 12px; color: #999; margin-bottom: 20px; }}
    .post-list {{ list-style: none; padding: 0; margin: 0; }}
    .post-list li {{ background: white; border-radius: 8px; margin-bottom: 12px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #4a90a4; }}
    .post-list li a {{ text-decoration: none; color: #2c5f6e; font-size: 15px; font-weight: 500; line-height: 1.5; }}
    .post-list li a:hover {{ color: #4a90a4; text-decoration: underline; }}
    footer {{ text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; color: #999; font-size: 13px; }}
  </style>
</head>
<body>
  <header>
    <h1>🌿 나무결상점</h1>
    <p>건축과 인테리어, 궁금할 땐 여기! 내·외장재부터 인테리어 자재까지</p>
    <p><a href="https://blog.naver.com/byunbe" style="color:#4a90a4;">📝 네이버 블로그 바로가기</a></p>
  </header>
  <p class="updated">마지막 업데이트: {updated} | 총 {{len(all_posts)}}개 글</p>
  <ul class="post-list">
{list_items}
  </ul>
  <footer>
    <p>© 나무결상점 | 건축자재 인테리어 전문 정보</p>
    <p><a href="https://blog.naver.com/byunbe" style="color:#4a90a4;">네이버 블로그</a></p>
  </footer>
</body>
</html>"""

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f'완료! 새 글 {added}개 추가, 전체 {len(all_posts)}개')
          EOF

      - name: 변경사항 저장
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add index.html
          git diff --staged --quiet || git commit -m '블로그 자동 업데이트'
          git push
